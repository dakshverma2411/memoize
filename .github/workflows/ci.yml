name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Build and Test
        run: mvn -B clean verify --fail-at-end

      - name: Upload Coverage Report
        if: matrix.java-version == 21
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'

      - name: Coverage Summary
        if: matrix.java-version == 21
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          for f in $(find . -path '*/site/jacoco/jacoco.csv' 2>/dev/null); do
            module=$(echo "$f" | sed 's|./\(.*\)/target/.*|\1|')
            missed=$(tail -n +2 "$f" | awk -F',' '{sum+=$4} END {print sum+0}')
            covered=$(tail -n +2 "$f" | awk -F',' '{sum+=$5} END {print sum+0}')
            total=$((missed + covered))
            if [ $total -gt 0 ]; then
              pct=$((covered * 100 / total))
              echo "- **$module**: ${pct}% instruction coverage ($covered/$total)" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload Test Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java-version }}
          path: '**/target/surefire-reports/'
